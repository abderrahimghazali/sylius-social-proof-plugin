sylius_grid:
    grids:
        social_proof_admin_widget:
            driver:
                name: doctrine/orm
                options:
                    class: '%social_proof.model.widget.class%'
            sorting:
                name: asc
            fields:
                name:
                    type: string
                    label: social_proof.form.name
                    sortable: ~
                type:
                    type: twig
                    label: social_proof.ui.widget_type
                    options:
                        template: '@SyliusSocialProofPlugin/admin/social_proof_widget/field/type.html.twig'
                enabled:
                    type: twig
                    label: sylius.ui.enabled
                    options:
                        template: '@SyliusAdmin/shared/grid/field/boolean.html.twig'
            filters:
                search:
                    type: string
                    label: sylius.ui.search
                    options:
                        fields: [name]
                enabled:
                    type: boolean
                    label: sylius.ui.enabled
            actions:
                main:
                    create:
                        type: create
                        options:
                            link:
                                route: social_proof_widget_create
                item:
                    update:
                        type: update
                        options:
                            link:
                                route: social_proof_widget_update
                                parameters:
                                    id: resource.id
                    delete:
                        type: delete
